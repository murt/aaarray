name: CI
on:
  push:
  pull_request:
    branches-ignore:
      - dependabot/*
jobs:
    unit-test:
        name: Unit Test
        runs-on: ubuntu-latest
        strategy:
            matrix:
                node-version: [20, 22, 24]
            fail-fast: true

        steps:
            - uses: actions/checkout@v4

            - name: Setup pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: 10

            - name: Use Node ${{ matrix.node-version }}
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ matrix.node-version }}
                  cache: pnpm

            - name: Install
              run: pnpm install

            - name: Build
              run: pnpm build

            - name: Test
              run: pnpm test

            - name: Upload coverage to Codecov
              uses: codecov/codecov-action@v5
              with:
                  files: ./coverage/lcov.info
                  flags: unittests
                  fail_ci_if_error: false

    firefox:
        name: Firefox
        runs-on: windows-latest
        steps:
            - uses: actions/checkout@v4

            - name: Setup pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: 10

            - uses: actions/setup-node@v4
              with:
                  node-version: 24
                  cache: pnpm

            - run: pnpm install
            - run: pnpm exec playwright install firefox
            - run: pnpm build
            - run: pnpm exec playwright test --project=firefox

    chrome:
        name: Chrome
        runs-on: windows-latest
        steps:
            - uses: actions/checkout@v4

            - name: Setup pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: 10

            - uses: actions/setup-node@v4
              with:
                  node-version: 24
                  cache: pnpm

            - run: pnpm install
            - run: pnpm exec playwright install chromium
            - run: pnpm build
            - run: pnpm exec playwright test --project=chromium

    safari:
        name: Safari
        runs-on: macos-latest
        steps:
            - uses: actions/checkout@v4

            - name: Setup pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: 10

            - uses: actions/setup-node@v4
              with:
                  node-version: 24
                  cache: pnpm

            - run: pnpm install
            - run: pnpm exec playwright install webkit
            - run: pnpm build
            - run: pnpm exec playwright test --project=webkit

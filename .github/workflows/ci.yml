name: CI
on:
  push:
  pull_request:
    branches-ignore:
      - dependabot/*
jobs:
    unit-test:
        name: Unit Test
        runs-on: ubuntu-latest
        strategy:
            matrix:
                node-version: [18, 20, 22]
            fail-fast: true

        steps:
            - uses: actions/checkout@v4

            - name: Setup pnpm
              uses: pnpm/action-setup@v2
              with:
                  version: 8

            - name: Use Node ${{ matrix.node-version }}
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ matrix.node-version }}
                  cache: pnpm

            - name: Install
              run: pnpm install

            - name: Build
              run: pnpm build

            - name: Test
              run: pnpm test

            - name: Upload coverage to Codecov
              uses: codecov/codecov-action@v3
              with:
                  files: ./coverage/lcov.info
                  flags: unittests
                  fail_ci_if_error: false

    firefox:
        name: Firefox
        runs-on: windows-latest
        steps:
            - uses: actions/checkout@v4

            - name: Setup pnpm
              uses: pnpm/action-setup@v2
              with:
                  version: 8

            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: pnpm

            - run: pnpm install
            - run: pnpm build
            - run: pnpm test:browser
              env:
                  BROWSER: firefox

    chrome:
        name: Chrome
        runs-on: windows-latest
        steps:
            - uses: actions/checkout@v4

            - name: Setup pnpm
              uses: pnpm/action-setup@v2
              with:
                  version: 8

            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: pnpm

            - run: pnpm install
            - run: pnpm build
            - run: pnpm test:browser
              env:
                  BROWSER: chrome

    safari:
        name: Safari
        runs-on: macos-latest
        steps:
            - uses: actions/checkout@v4

            - name: Setup pnpm
              uses: pnpm/action-setup@v2
              with:
                  version: 8

            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: pnpm

            - run: pnpm install
            - run: pnpm build
            - run: |
                sudo safaridriver --enable
                pnpm test:browser
              env:
                  BROWSER: safari
